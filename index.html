<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Simulateur NRBC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="overlay">
    <h1>🚨 Simulateur NRBC</h1>
    <p>Analyse et conduite opérationnelle</p>
  </div>
</header>

<main>

<section class="card">
  <h2>Situation</h2>

  <textarea id="situationInput" placeholder="Décris la situation..."></textarea>

  <div class="actions">
    <button onclick="analyserSituation()">Analyser</button>
    <button onclick="jouerAlarme()">🔊 Test alarme</button>
  </div>
</section>

<section class="card">
  <h2>Scénarios</h2>

  <div class="actions">
    <button onclick="chargerScenario('chimique')">☣️ Chimique</button>
    <button onclick="chargerScenario('biologique')">🧬 Biologique</button>
    <button onclick="chargerScenario('radiologique')">☢️ Radiologique</button>
  </div>
</section>

<section class="card">
  <h2>Résultat</h2>
  <div id="resultat"></div>
</section>

<section class="card">
  <h2>Étapes</h2>
  <div id="stepBox"></div>

  <div class="actions">
    <button onclick="prevStep()">⬅</button>
    <button onclick="nextStep()">➡</button>
  </div>
</section>

<section class="card">
  <h2>Compte-rendu</h2>
  <div id="compteRendu"></div>

  <div class="actions">
    <button onclick="genererCompteRendu()">Générer</button>
    <button onclick="copierCompteRendu()">Copier</button>
  </div>
</section>

</main>

<footer>
Créé par Julien FLAMENT | Lxxw
</footer>

<audio id="sirene" src="sounds/alarm.wav"></audio>
<audio id="voix" src="sounds/alerte-nrbc.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
